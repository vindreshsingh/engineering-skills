name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate skills, agents, and manifests
        run: bash scripts/validate.sh
      - name: Check the skills catalog is up to date
        run: |
          bash scripts/generate-catalog.sh
          if ! git diff --quiet -- SKILLS.md; then
            echo "SKILLS.md is out of date. Run: bash scripts/generate-catalog.sh"
            git --no-pager diff -- SKILLS.md
            exit 1
          fi
